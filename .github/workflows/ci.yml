name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install host system dependencies
        run: sudo apt-get update && sudo apt-get install --yes libdbus-1-dev pkg-config
      - run: cargo test --locked
      - run: cargo fmt --check
      - run: cargo check --locked --lib
      - run: cargo clippy --locked --lib -- -D warnings
      - run: cargo test --locked --manifest-path tools/hidshift-client/Cargo.toml
      - run: cargo test --locked --manifest-path tools/hidshiftctl/Cargo.toml
      - run: cargo check --locked --manifest-path web/Cargo.toml --target wasm32-unknown-unknown
      - run: cargo fmt --check --manifest-path tools/hidshift-client/Cargo.toml
      - run: cargo fmt --check --manifest-path tools/hidshiftctl/Cargo.toml
      - run: cargo fmt --check --manifest-path web/Cargo.toml

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ESP Xtensa Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.7.0
        with:
          buildtargets: esp32s3
          default: false
          ldproxy: false
      - uses: Swatinem/rust-cache@v2
        with:
          key: esp32s3
      - name: Build production firmware
        run: >-
          cargo +esp build --locked -Zbuild-std=core,alloc --release
          --manifest-path firmware/Cargo.toml --bin firmware
          --target xtensa-esp32s3-none-elf
      - name: Record firmware size
        run: stat --printf='firmware_bytes=%s\n' target/xtensa-esp32s3-none-elf/release/firmware
      - name: Check diagnostic firmware
        run: >-
          cargo +esp check --locked -Zbuild-std=core,alloc
          --manifest-path firmware/Cargo.toml --bin firmware --features diagnostic-input
          --target xtensa-esp32s3-none-elf
